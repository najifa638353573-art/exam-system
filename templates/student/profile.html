{% extends "student/base.html" %}
{% block content %}
  <h2>My Profile</h2>
  {% if user.profile_image %}
    <div style="margin:10px 0;">
      <img src="{{ url_for('static', filename='uploads/' + user.profile_image) }}" alt="profile" style="width:110px;height:110px;object-fit:cover;border-radius:16px;border:1px solid #e5e7eb;"/>
    </div>
  {% endif %}
  <p class="muted">
    Phone: <b>{{ user.phone }}</b><br/>
    Subject: <b>{{ user.subject_name or '-' }}</b><br/>
    Status: <span class="pill">{{ user.status }}</span>
  </p>

  <h3>Edit</h3>
  <form method="post" enctype="multipart/form-data">
    <div class="row">
      <div>
        <label>Name</label>
        <input name="name" required value="{{ user.name }}" />
      </div>
      <div>
        <label>WhatsApp (+8801XXXXXXXXX)</label>
        <input name="whatsapp" required value="{{ user.whatsapp }}" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Location</label>
        <input name="location" required value="{{ user.location }}" />
      </div>
      <div>
        <label>Current Status</label>
        <input name="current_status" required value="{{ user.current_status }}" />
      </div>
    </div>

    <label>Education Level</label>
    <input name="education_level" required value="{{ user.education_level }}" />


    <label>Profile Photo (PNG/JPG)</label>
    <input type="file" name="profile_image" accept=".png,.jpg,.jpeg" />

    <button class="btn btn2" type="submit" style="margin-top:12px;">Save</button>
    <a class="btn" href="{{ url_for('dashboard') }}">Back</a>
  </form>
{% endblock %}
