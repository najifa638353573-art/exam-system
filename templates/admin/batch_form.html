{% extends "admin/base.html" %}
{% block content %}
  <h2>{% if mode=='add' %}Add Batch{% else %}Edit Batch{% endif %}</h2>
  <form method="post">
    <label>Subject</label>
    <select name="subject_id" required>
      {% for s in subjects %}
        <option value="{{ s.id }}" {% if b and b.subject_id==s.id %}selected{% endif %}>{{ s.name }}</option>
      {% endfor %}
    </select>

    <label>Batch Name</label>
    <input name="name" required value="{{ b.name if b else '' }}" />

    <label>
      <input type="checkbox" name="is_active" {% if b and b.is_active %}checked{% elif not b %}checked{% endif %}/>
      Active
    </label>

    <button class="btn btn2" type="submit" style="margin-top:12px;">Save</button>
    <a class="btn" href="{{ url_for('admin_batches') }}">Back</a>
  </form>
{% endblock %}
